# Bitir Yemek - single-instance VPS app stack (app + PostgreSQL + Redis).
#
# TLS termination & domain routing are handled by the SHARED Caddy reverse
# proxy (see ../proxy/), NOT here. The `app` container joins the shared external
# "edge" network so Caddy can reach it; db/redis stay on the private internal
# network and are never exposed.
#
# Prerequisite (one-time, see DEPLOYMENT.md):  docker network create edge
#
# Secrets are NEVER hardcoded here. Provide them via a .env file in this
# directory (copied from .env.example). Compose reads .env automatically for
# ${VAR} interpolation below, and the `app` service additionally loads the full
# .env at runtime via env_file.
#
# Required .env vars for compose interpolation:
#   POSTGRES_DB, POSTGRES_USER, POSTGRES_PASSWORD, REDIS_PASSWORD
# (plus everything the app itself needs - see .env.example / DEPLOYMENT.md)

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: bitir-yemek-app:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      # Point the app at the compose service names. These override anything in
      # .env so the container talks to the sibling db/redis containers.
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_URL: redis://default:${REDIS_PASSWORD}@redis:6379
    volumes:
      # Persist user-uploaded images across container rebuilds.
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      # Private network for db/redis access.
      bitir-net: {}
      # Shared proxy network; Caddy reaches the app via this alias.
      edge:
        aliases:
          - bitir-yemek-app
    # Not published to the host: the shared Caddy proxy is the only public entrypoint.
    expose:
      - "3000"

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - bitir-net
    # Keep Postgres internal to the compose network only.
    expose:
      - "5432"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # Password comes from .env; the app connects via REDIS_URL above.
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bitir-net
    expose:
      - "6379"

networks:
  bitir-net:
    driver: bridge
  # Shared proxy network, created once with: docker network create edge
  # Owned by ../proxy/ (the shared Caddy proxy). Declared external here so this
  # stack only attaches the app to it without managing its lifecycle.
  edge:
    external: true

volumes:
  pgdata:
  redisdata:
  uploads:
