name: bitir_yemek_mobile
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+2

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  
  # HTTP & API
  dio: ^5.4.0
  
  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  bloc_concurrency: ^0.2.5
  stream_transform: ^2.1.0
  
  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  
  # Location
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  
  # Maps
  mapbox_maps_flutter: ^2.4.0
  url_launcher: ^6.2.5

  # Payments (iyzico checkout form rendered in a WebView)
  flutter_inappwebview: ^6.0.0

  # Auth
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.4
  crypto: ^3.0.6
  
  # Image Caching
  cached_network_image: ^3.3.0
  
  # Utilities
  intl: ^0.18.1
  logger: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

# Uygulama ikonu üretimi: `dart run flutter_launcher_icons`
# Kaynak görsel splash ekranındaki tasarımı (turuncu zemin + beyaz yaprak) yansıtır.
flutter_launcher_icons:
  image_path: "assets/icon/app_icon.png"
  android: true
  ios: true
  remove_alpha_ios: true
  min_sdk_android: 21
  adaptive_icon_background: "#FF7043"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"

flutter:
  uses-material-design: true
  
  fonts:
    - family: Korolev
      fonts:
        - asset: assets/fonts/Korolev Thin.otf
          weight: 100
        - asset: assets/fonts/Korolev Light.otf
          weight: 300
        - asset: assets/fonts/Korolev Medium.otf
          weight: 500
        - asset: assets/fonts/Korolev Bold.otf
          weight: 700
        - asset: assets/fonts/Korolev Heavy.otf
          weight: 900
  
  assets:
    - assets/images/
